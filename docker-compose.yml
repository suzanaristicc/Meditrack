services:
  api:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run seed && npm run dev -w apps/api"
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=file:/app/apps/api/data/meditrack.db

  web:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -w apps/web -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:4000/api
    depends_on:
      - api
